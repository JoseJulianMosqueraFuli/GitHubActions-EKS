---
- name: Destruir infraestructura EKS
  hosts: local
  gather_facts: false

  tasks:
    - name: Eliminar Fargate Profile
      command: >
        aws eks delete-fargate-profile
        --cluster-name {{ eks_cluster_name }}
        --fargate-profile-name {{ fargate_profile_name }}
        --region {{ aws_region }}
      ignore_errors: true

    - name: Esperar eliminación del Fargate Profile
      command: >
        aws eks describe-fargate-profile
        --cluster-name {{ eks_cluster_name }}
        --fargate-profile-name {{ fargate_profile_name }}
        --region {{ aws_region }}
      register: fg_check
      until: fg_check.rc != 0
      retries: 30
      delay: 20
      ignore_errors: true

    - name: Eliminar EKS Cluster
      amazon.aws.eks_cluster:
        name: "{{ eks_cluster_name }}"
        region: "{{ aws_region }}"
        state: absent
        wait: true

    - name: Eliminar Fargate Pod Execution Role
      amazon.aws.iam_role:
        name: "{{ project_name }}-fargate-pod-execution-role"
        state: absent

    - name: Eliminar EKS Cluster Role
      amazon.aws.iam_role:
        name: "{{ project_name }}-eks-cluster-role"
        state: absent

    - name: Obtener VPC ID
      amazon.aws.ec2_vpc_net_info:
        region: "{{ aws_region }}"
        filters:
          "tag:Name": "{{ vpc_name }}"
      register: vpc_info

    - name: Eliminar subnets
      amazon.aws.ec2_vpc_subnet:
        vpc_id: "{{ vpc_info.vpcs[0].id }}"
        cidr: "{{ item.cidr }}"
        region: "{{ aws_region }}"
        state: absent
      loop: "{{ subnets }}"
      when: vpc_info.vpcs | length > 0

    - name: Eliminar Route Tables
      amazon.aws.ec2_vpc_route_table:
        vpc_id: "{{ vpc_info.vpcs[0].id }}"
        region: "{{ aws_region }}"
        tags:
          Name: "{{ project_name }}-public-rt"
        state: absent
      when: vpc_info.vpcs | length > 0

    - name: Eliminar Internet Gateway
      amazon.aws.ec2_vpc_igw:
        vpc_id: "{{ vpc_info.vpcs[0].id }}"
        region: "{{ aws_region }}"
        state: absent
      when: vpc_info.vpcs | length > 0

    - name: Eliminar VPC
      amazon.aws.ec2_vpc_net:
        name: "{{ vpc_name }}"
        cidr_block: "{{ vpc_cidr }}"
        region: "{{ aws_region }}"
        state: absent
      when: vpc_info.vpcs | length > 0
