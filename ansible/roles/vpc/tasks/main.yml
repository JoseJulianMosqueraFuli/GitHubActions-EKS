---
- name: Crear VPC
  amazon.aws.ec2_vpc_net:
    name: "{{ vpc_name }}"
    cidr_block: "{{ vpc_cidr }}"
    region: "{{ aws_region }}"
    state: present
    tags:
      Name: "{{ vpc_name }}"
      Project: "{{ project_name }}"
  register: vpc_result

- name: Crear Internet Gateway
  amazon.aws.ec2_vpc_igw:
    vpc_id: "{{ vpc_result.vpc.id }}"
    region: "{{ aws_region }}"
    state: present
    tags:
      Name: "{{ project_name }}-igw"
      Project: "{{ project_name }}"
  register: igw_result

- name: Crear subnets públicas
  amazon.aws.ec2_vpc_subnet:
    vpc_id: "{{ vpc_result.vpc.id }}"
    cidr: "{{ item.cidr }}"
    az: "{{ item.az }}"
    region: "{{ aws_region }}"
    state: present
    map_public: true
    tags:
      Name: "{{ item.name }}"
      Project: "{{ project_name }}"
      "kubernetes.io/role/elb": "1"
      "kubernetes.io/cluster/{{ eks_cluster_name }}": "shared"
  loop: "{{ subnets }}"
  register: subnet_results

- name: Obtener IDs de subnets
  set_fact:
    subnet_ids: "{{ subnet_results.results | map(attribute='subnet.id') | list }}"

- name: Crear Route Table pública
  amazon.aws.ec2_vpc_route_table:
    vpc_id: "{{ vpc_result.vpc.id }}"
    region: "{{ aws_region }}"
    tags:
      Name: "{{ project_name }}-public-rt"
      Project: "{{ project_name }}"
    subnets: "{{ subnet_ids }}"
    routes:
      - dest: "0.0.0.0/0"
        gateway_id: "{{ igw_result.gateway_id }}"
    state: present
