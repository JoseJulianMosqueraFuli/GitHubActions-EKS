apiVersion: apps/v1
kind: Deployment
metadata:
  name: loadtest-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: loadtest-api
  template:
    metadata:
      labels:
        app: loadtest-api
    spec:
      containers:
        - name: loadtest-api
          image: IMAGE_PLACEHOLDER
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "500m"
              memory: "128Mi"
            limits:
              cpu: "1000m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: loadtest-api
spec:
  selector:
    app: loadtest-api
  ports:
    - port: 80
      targetPort: 8080
  type: LoadBalancer
